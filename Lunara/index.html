    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Luxurious+Roman&family=Luxurious+Script&family=Lora:wght@400;500;600;700&display=swap"
      onload="this.onload=null;this.rel='stylesheet'"
    />

      <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Luxurious+Roman&family=Luxurious+Script&family=Lora:wght@400;500;600;700&display=swap" />
    </noscript>
