sonar.projectKey=AQC-Week-5
sonar.projectName=Lunara Frontend
sonar.projectVersion=1.0
sonar.sources=src
sonar.language=js
sonar.sourceEncoding=UTF-8
sonar.host.url=http://localhost:9000

# Exclude test files from analysis
sonar.exclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx,**/tests/**/*,**/test/**/*,**/__tests__/**/*,**/__mocks__/**/*

# Test sources (for coverage reporting but not code analysis)
sonar.tests=src/tests

# Coverage exclusions (if needed)
sonar.coverage.exclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx,**/tests/**/*,**/test/**/*

# JavaScript/TypeScript coverage report paths
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.typescript.lcov.reportPaths=coverage/lcov.info 