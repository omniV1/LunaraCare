# Render Blueprint - LUNARA Backend
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: lunara-api
    runtime: node
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: npm ci --include=dev && npm run type-check && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: SKIP_EMAIL_VERIFICATION
        value: "false"
      - key: RATE_LIMIT_DISABLED
        value: "false"
      - key: LOG_LEVEL
        value: warn
      # Secrets - set these in Render Dashboard
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: API_URL
        sync: false
      - key: FRONTEND_URL
        sync: false
      # Email
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: EMAIL_FROM_NAME
        sync: false
      - key: INQUIRY_NOTIFY_EMAIL
        sync: false
      # OAuth
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_CALLBACK_URL
        sync: false
      # Push Notifications
      - key: VAPID_PUBLIC_KEY
        sync: false
      - key: VAPID_PRIVATE_KEY
        sync: false
      - key: VAPID_EMAIL
         sync: false
