sonar.projectKey=AQC-Week-5
sonar.projectName=Lunara Backend
sonar.projectVersion=1.0
sonar.sources=src
sonar.tests=tests
sonar.language=ts
sonar.sourceEncoding=UTF-8
sonar.host.url=http://localhost:9000

# Exclude build artifacts, dependencies, and test files from code analysis
sonar.exclusions=**/node_modules/**,**/dist/**,**/*.d.ts,**/*.test.ts,**/*.test.js,**/*.spec.ts,**/*.spec.js,**/tests/**/*.js,**/tests/**/*.d.ts,**/tests/**/*.map,**/test/**/*

# Test file exclusions
sonar.test.exclusions=**/node_modules/**

# Coverage exclusions
sonar.coverage.exclusions=**/tests/**,**/node_modules/**,**/*.test.ts,**/*.test.js,**/*.spec.ts,**/*.spec.js

# TypeScript coverage report paths
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.typescript.lcov.reportPaths=coverage/lcov.info
